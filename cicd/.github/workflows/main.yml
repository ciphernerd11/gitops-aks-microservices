name: Build, Push & Update Manifests

on:
  push:
    branches: [main]

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  REGISTRY: ${{ secrets.ACR_NAME }}.azurecr.io

jobs:
  build-push-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── Checkout ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Azure login & ACR auth ──
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      # ── Build & Push — Frontend ──
      - name: Build frontend image
        run: docker build -t $REGISTRY/frontend:${{ github.sha }} ./src/frontend

      - name: Push frontend image
        run: docker push $REGISTRY/frontend:${{ github.sha }}

      # ── Build & Push — Alert API ──
      - name: Build alert-api image
        run: docker build -t $REGISTRY/alert-api:${{ github.sha }} ./src/alert-api

      - name: Push alert-api image
        run: docker push $REGISTRY/alert-api:${{ github.sha }}

      # ── Build & Push — Resource API ──
      - name: Build resource-api image
        run: docker build -t $REGISTRY/resource-api:${{ github.sha }} ./src/resource-api

      - name: Push resource-api image
        run: docker push $REGISTRY/resource-api:${{ github.sha }}

      # ── Build & Push — Notification Worker ──
      - name: Build notification-worker image
        run: docker build -t $REGISTRY/notification-worker:${{ github.sha }} ./src/notification-worker

      - name: Push notification-worker image
        run: docker push $REGISTRY/notification-worker:${{ github.sha }}

      # ── Update Kubernetes manifests with new image tags ──
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in kube/ manifests
        run: |
          TAG="${{ github.sha }}"
          # Frontend
          yq -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'$REGISTRY'/frontend:'$TAG'"' kube/frontend-deployment.yaml
          # Alert API
          yq -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'$REGISTRY'/alert-api:'$TAG'"' kube/alert-api-deployment.yaml
          # Resource API
          yq -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'$REGISTRY'/resource-api:'$TAG'"' kube/resource-api-deployment.yaml
          # Notification Worker
          yq -i '(select(.kind == "Deployment") | .spec.template.spec.containers[0].image) = "'$REGISTRY'/notification-worker:'$TAG'"' kube/notification-worker-deployment.yaml

      # ── Commit & Push updated manifests ──
      - name: Commit & push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kube/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${{ github.sha }}"
          git push
