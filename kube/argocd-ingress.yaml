apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    appgw.ingress.kubernetes.io/ssl-redirect: "false"
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/hostname: "argocd.disaster-relief.com"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - argocd.disaster-relief.com
      secretName: disaster-relief-tls
  rules:
  - host: argocd.disaster-relief.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 80
