name: Infrastructure CI/CD (Terraform)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, qa, uat, prod)'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - qa
        - uat
        - prod
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/**'

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

jobs:
  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform plan -var-file="environments/$ENV_NAME.tfvars" -no-color

  terraform-apply:
    name: 'Terraform Apply'
    needs: terraform-plan
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    defaults:
      run:
        working-directory: ./infrastructure

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: |
          ENV_NAME="${{ github.event.inputs.environment || 'dev' }}"
          terraform init -backend-config="key=${ENV_NAME}.tfstate"

      - name: Terraform Apply
        run: terraform apply -var-file="environments/${{ github.event.inputs.environment }}.tfvars" -auto-approve -input=false
