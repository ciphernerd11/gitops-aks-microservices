apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notification-worker-service
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: disaster-relief
spec:
  project: default

  source:
    repoURL: https://github.com/ciphernerd11/gitops-aks-microservices.git
    targetRevision: main
    path: kube/notification-worker/

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
