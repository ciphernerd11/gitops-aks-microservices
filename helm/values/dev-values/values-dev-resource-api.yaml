kind: Deployment
partOf: disaster-relief
replicaCount: 2
image:
  repository: acrdisasterreliefdev.azurecr.io/resource-api
  tag: resource-api-eb1e65bc
ports:
  - containerPort: 3000
    servicePort: 80
    name: http
livenessProbe:
  path: /health
readinessProbe:
  path: /health
service:
  enabled: true
ingress:
  enabled: false
env:
  - name: PGHOST
    value: "postgres-service"
  - name: PGUSER
    value: "postgres"
  - name: PGPASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-secret
        key: POSTGRES_PASSWORD
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
