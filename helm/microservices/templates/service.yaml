{{- if (or .Values.service.enabled (not (hasKey .Values.service "enabled"))) -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-service
  labels:
    {{- include "microservices.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  selector:
    {{- include "microservices.selectorLabels" . | nindent 4 }}
  ports:
    {{- if .Values.ports }}
    {{- range .Values.ports }}
    - port: {{ .servicePort | default .containerPort }}
      targetPort: {{ .containerPort }}
      protocol: {{ .protocol | default "TCP" }}
      name: {{ .name | default "http" }}
    {{- end }}
    {{- else }}
    - port: {{ .Values.service.externalPort | default 80 }}
      targetPort: {{ .Values.service.port | default 8080 }}
      protocol: TCP
      name: http
    {{- end }}
{{- end }}